name: Release

# Cuts a GitHub Release with a downloadable APK when you push a version tag, e.g.:
#   git tag v1.0 && git push origin v1.0
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # required for the GITHUB_TOKEN to create a Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Builds the debug APK, which is signed with the auto-generated debug key and
      # therefore directly installable. For a Play-Store-ready signed *release* APK,
      # add a keystore as repo secrets and replace this step (see the note at the
      # bottom of this file).
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Stage APK with version name
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/Kaspotify-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kaspotify ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/Kaspotify-*.apk
          body: |
            **Kaspotify ${{ github.ref_name }}**

            The attached APK is **debug-signed** (installable on any device with
            "install unknown apps" enabled). It is not signed with a release key, so
            it is not Play-Store-ready as-is.

# ---------------------------------------------------------------------------
# To ship a properly signed RELEASE APK instead:
#   1. Generate a keystore:  keytool -genkey -v -keystore kaspotify.jks \
#        -keyalg RSA -keysize 2048 -validity 10000 -alias kaspotify
#   2. Add repo secrets: KEYSTORE_BASE64 (base64 of the .jks), KEYSTORE_PASSWORD,
#      KEY_ALIAS, KEY_PASSWORD.
#   3. Add a signingConfig to app/build.gradle.kts wired to those env vars, build
#      with `./gradlew assembleRelease`, and point the upload at
#      app/build/outputs/apk/release/app-release.apk.
# ---------------------------------------------------------------------------
